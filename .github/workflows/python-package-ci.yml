name: Python Package CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build the app
        run: echo "Simulating build step (no real build command specified)"

      - name: Run tests
        run: pytest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: Stanleys Testing
    env:
      DEPLOYMENT_KEY: ${{ secrets.DEPLOY_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Stanleys Testing environment
        run: echo "Deployment would happen here (but this is just a test!)"
